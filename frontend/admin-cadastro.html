<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="./css/admin-cadastro.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div>
              <strong>Lavínia Souto</strong>
              <span>Administração</span>
            </div>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Menu principal">
          <a class="nav-link" href="./admin.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
          <a class="nav-link" href="./admin.html"><i class="fa-solid fa-users"></i> Usuários</a>
          <a class="nav-link active" href="./admin-cadastro.html"><i class="fa-solid fa-user-plus"></i> Cadastrar Cliente</a>
          <a class="nav-link" href="./paginainicial.html"><i class="fa-solid fa-gear"></i> Configurações</a>
        </nav>

        <div class="sidebar-footer">
          <strong>Acesso restrito</strong>
          <span>Somente administradores podem cadastrar novos clientes.</span>
        </div>
      </aside>

      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <main class="main-panel">
        <header class="topbar">
          <div class="topbar-left">
            <button class="mobile-toggle" id="mobileToggle" type="button" aria-label="Abrir menu">
              <i class="fa-solid fa-bars"></i>
            </button>
            <div>
              <p class="eyebrow">Painel Administrativo</p>
              <h1>Cadastro de clientes</h1>
            </div>
          </div>
          <a class="back-btn" href="./admin.html"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        </header>

        <section class="page-content">
          <section class="panel-card form-card">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Novo cadastro</p>
                <h2>Preencha os dados abaixo</h2>
              </div>
            </div>

            <form class="register-form" id="registerForm" novalidate>
              <div class="field-card">
                <label for="nome">Nome completo</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-user"></i>
                  <input id="nome" name="nome" type="text" placeholder="Digite o nome completo" required />
                </div>
              </div>

              <div class="field-card">
                <label for="email">Email</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-envelope"></i>
                  <input id="email" name="email" type="email" placeholder="Digite o e-mail" required />
                </div>
              </div>

              <div class="field-card">
                <label for="endereco">Endereço</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-location-dot"></i>
                  <input id="endereco" name="endereco" type="text" placeholder="Digite o endereço" required />
                </div>
              </div>

              <div class="field-card">
                <label for="cpf">CPF</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-id-card"></i>
                  <input id="cpf" name="cpf" type="text" placeholder="000.000.000-00" maxlength="14" required />
                </div>
              </div>

              <div class="field-card">
                <label for="senha">Senha</label>
                <div class="input-wrap">
                  <i class="fa-solid fa-lock"></i>
                  <input id="senha" name="senha" type="password" placeholder="Digite a senha" required />
                </div>
              </div>

              <div class="form-actions">
                <button class="submit-btn" type="submit"><i class="fa-solid fa-user-plus"></i> Cadastrar cliente</button>
              </div>

              <div class="message" id="messageBox" aria-live="polite"></div>
            </form>
          </section>

          <section class="panel-card list-card">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Clientes</p>
                <h2>Clientes cadastrados</h2>
              </div>
            </div>
            <div id="clientesList" class="clients-list"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="./js/admin-cadastro.js"></script>
  </body>
</html>
