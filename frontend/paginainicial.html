<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAPI | Início</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="welcome-page">
    <main class="welcome-shell">
      <section class="welcome-card">
        <div class="welcome-badge">
          <i class="fa-solid fa-shield-halved"></i>
          Área restrita
        </div>
        <p class="eyebrow">Lavinia Souto</p>
        <h1>Bem-vindo ao seu painel</h1>
        <p class="welcome-text">
          A sua experiência começa aqui. Acesse sua área personalizada, acompanhe as informações do sistema e mantenha o controle do ambiente administrativo com segurança.
        </p>

        <div class="profile-card" id="profileCard">
          <div class="profile-avatar">
            <i class="fa-solid fa-user"></i>
          </div>
          <div class="profile-info">
            <h3 id="profileName">Carregando...</h3>
            <p id="profileEmail">Aguarde</p>
            <span id="profileType" class="profile-pill">Carregando...</span>
          </div>
        </div>

        <div class="welcome-actions">
          <a class="primary-btn" href="./admin.html" id="adminLink"><i class="fa-solid fa-chart-line"></i> Painel Admin</a>
          <button class="ghost-btn" id="logoutBtn" type="button"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
        </div>
      </section>
    </main>

    <script src="./js/paginainicial.js"></script>
  </body>
</html>
